name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # html-validate@11 requires Node ^22.17 || >=24 (utilise fs.globSync)
          node-version: '22'

      - name: Lint HTML (html-validate)
        run: npx --yes html-validate@11 index.html privacy.html legal.html support.html 404.html

      - name: Lint sitemap.xml (well-formed XML)
        # python3 est pré-installé sur ubuntu-latest, contrairement à xmllint
        # qui n'est pas garanti dans l'image runner. ET.parse() lève si le
        # XML est mal formé.
        run: python3 -c "import xml.etree.ElementTree as ET; ET.parse('sitemap.xml')"

      - name: Check footer coherence (4 pages)
        run: node tools/check-footer.mjs
