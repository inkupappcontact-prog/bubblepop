<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page not found · BubblePop</title>
    <meta name="robots" content="noindex">
    <link rel="canonical" href="https://getbubblepop.com/">
    <meta name="theme-color" content="#0A0B0F">

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 44 36'%3E%3Cellipse cx='22' cy='16' rx='20' ry='12' fill='%233B82F6'/%3E%3Cpath d='M14 25 L11 34 L20 27 Z' fill='%233B82F6'/%3E%3Ccircle cx='14' cy='16' r='2' fill='%230A0B0F'/%3E%3Ccircle cx='22' cy='16' r='2' fill='%230A0B0F'/%3E%3Ccircle cx='30' cy='16' r='2' fill='%230A0B0F'/%3E%3C/svg%3E">

    <style>
        @font-face {
            font-family: 'Inter';
            font-style: normal;
            font-weight: 100 900;
            font-display: swap;
            src: url('fonts/inter-var.woff2') format('woff2');
        }
        @font-face {
            font-family: 'Bangers';
            font-style: normal;
            font-weight: 400;
            font-display: swap;
            src: url('fonts/bangers-400.woff2') format('woff2');
        }

        :root, [data-theme="dark"] {
            --bg:       #0A0B0F;
            --surface:  #181A23;
            --ink:      #F5F5F2;
            --ink-2:    #A0A4AE;
            --border:   #262934;
            --accent:   #3B82F6;
            --accent-2: #1D4ED8;
            --shadow:   0 18px 40px rgba(0,0,0,.55), 0 4px 12px rgba(0,0,0,.35);
        }
        [data-theme="light"] {
            --bg:       #F8F6EF;
            --surface:  #FFFFFF;
            --ink:      #0F1116;
            --ink-2:    #525664;
            --border:   #E4DFD0;
            --accent:   #3B82F6;
            --accent-2: #1D4ED8;
            --shadow:   0 12px 32px rgba(15,17,22,.08), 0 4px 12px rgba(15,17,22,.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            max-width: 520px;
        }

        .bubble {
            position: relative;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 28px;
            padding: 28px 56px 36px;
            box-shadow: var(--shadow);
        }
        .bubble::after {
            content: '';
            position: absolute;
            bottom: -18px;
            left: 40px;
            width: 32px;
            height: 32px;
            background: var(--surface);
            border-right: 2px solid var(--border);
            border-bottom: 2px solid var(--border);
            transform: rotate(45deg);
            border-bottom-right-radius: 6px;
        }
        .code {
            font-family: 'Bangers', 'Impact', sans-serif;
            font-size: clamp(72px, 18vw, 132px);
            line-height: 1;
            letter-spacing: 0.04em;
            color: var(--ink);
            user-select: none;
        }

        h1 {
            font-size: clamp(22px, 4vw, 28px);
            font-weight: 700;
            margin-top: 4px;
        }
        p {
            color: var(--ink-2);
            font-size: 16px;
            line-height: 1.55;
            max-width: 38ch;
        }

        .cta {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 22px;
            background: var(--accent);
            color: #FFFFFF;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            transition: background 160ms ease, transform 160ms ease;
        }
        .cta:hover { background: var(--accent-2); transform: translateY(-2px); }
        .cta:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 3px;
        }
    </style>
</head>
<body>
    <main>
        <div class="bubble" aria-hidden="true">
            <div class="code">404</div>
        </div>
        <h1 data-en="Page not found" data-fr="Page introuvable">Page not found</h1>
        <p data-en="This bubble popped. The page you're looking for doesn't exist or has moved."
           data-fr="Cette bulle a éclaté. La page que vous cherchez n'existe pas ou a été déplacée.">This bubble popped. The page you're looking for doesn't exist or has moved.</p>
        <a href="/" class="cta" data-en="Back to BubblePop" data-fr="Retour à BubblePop">Back to BubblePop</a>
    </main>

    <script>
        (function () {
            try {
                var theme = localStorage.getItem('bubblepop:theme');
                if (theme !== 'dark' && theme !== 'light') {
                    theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
                }
                document.documentElement.setAttribute('data-theme', theme);
                document.querySelector('meta[name="theme-color"]')
                    .setAttribute('content', theme === 'dark' ? '#0A0B0F' : '#F8F6EF');

                var lang = localStorage.getItem('bubblepop:lang');
                if (lang !== 'fr' && lang !== 'en') {
                    lang = (navigator.language || 'en').toLowerCase().startsWith('fr') ? 'fr' : 'en';
                }
                document.documentElement.setAttribute('lang', lang);
                document.title = lang === 'fr'
                    ? '404 — Page introuvable · BubblePop'
                    : '404 — Page not found · BubblePop';
                document.querySelectorAll('[data-' + lang + ']').forEach(function (el) {
                    el.textContent = el.getAttribute('data-' + lang);
                });
            } catch (e) { /* failsafe : reste en EN dark */ }
        })();
    </script>
</body>
</html>
